<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Contact Engineering Team</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://kit.fontawesome.com/yourkit.js" crossorigin="anonymous"></script>
</head>

<body>

<header class="navbar">
<div class="container nav-inner">

<div class="logo">Engineering Consulting</div>

<nav>
<a href="index.html">Home</a>
<a href="index.html#services">Services</a>
<a href="index.html#process">Process</a>
<a href="contact.html">Contact</a>
</nav>

</div>
</header>

<section class="section contact-section">

<div class="container">

<h1>Start Technical Review</h1>

<p>
Send us your product information and we will review the engineering risks.
</p>

<form id="contact-form">

<input type="text" name="name" placeholder="Name" required>

<input type="text" name="company" placeholder="Company">

<input type="email" name="email" placeholder="Email" required>

<select name="certification">

<option>Certification Target</option>
<option>CE</option>
<option>FCC</option>
<option>UL</option>

</select>

<textarea name="message" placeholder="Describe your product"></textarea>

<button class="btn-primary">Submit Review</button>

</form>

</div>

</section>

<script src="js/script.js"></script>

</body>
</html>

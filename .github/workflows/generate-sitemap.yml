name: Generate Sitemap

on:
  push:
    branches:
      - main  # 你主分支名字，如果不是 main，改成你的分支

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. 安装依赖（xmlstarlet 用来生成 XML）
      - name: Install xmlstarlet
        run: sudo apt-get update && sudo apt-get install -y xmlstarlet

      # 3. 自动生成 sitemap.xml
      - name: Generate sitemap.xml
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?><urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' > sitemap.xml
          # 遍历所有 HTML 文件（根目录和 blog 文件夹）
          for file in $(find . -type f -name "*.html" -not -path "./.github/*"); do
            # 去掉前缀 ./ 和 index.html
            url=$(echo $file | sed 's/^\.\///;s/index.html$//;s/\.html$//')
            if [ "$url" = "" ]; then
              url="/"
            else
              url="/$url.html"
            fi
            echo "<url><loc>https://www.cra-eng.com$url</loc></url>" >> sitemap.xml
          done
          echo '</urlset>' >> sitemap.xml
          cat sitemap.xml

      # 4. 提交并 push
      - name: Commit and push sitemap.xml
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git commit -m "Update sitemap.xml via GitHub Actions" || echo "No changes to commit"
          git push
